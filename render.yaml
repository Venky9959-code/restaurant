services:
  - type: web
    name: dineflow
    runtime: python
    plan: free

    buildCommand: "./build.sh"

    startCommand: "gunicorn restaurant.wsgi:application"

    envVars:
      - key: PYTHON_VERSION
        value: "3.11.0"

      - key: SECRET_KEY
        generateValue: true

      - key: DEBUG
        value: "False"

      - key: DATABASE_URL
        fromDatabase:
          name: dineflow-db
          property: connectionString